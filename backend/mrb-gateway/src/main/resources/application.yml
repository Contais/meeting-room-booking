server:
  port: 8080

spring:
  application:
    name: mrb-gateway
  config:
    import: "optional:nacos:"
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      discovery:
        namespace: dev
    gateway:
      routes:
        - id: user-service
          uri: lb://mrb-user
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1
        - id: auth-service
          uri: lb://mrb-auth
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: meeting-service
          uri: lb://mrb-meeting
          predicates:
            - Path=/api/meeting/**
          filters:
            - StripPrefix=1
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
