server:
  port: 8082

spring:
  application:
    name: mrb-auth
  datasource:
    url: jdbc:mysql://localhost:3306/mrb_auth?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

jwt:
  secret: mrb-meeting-room-booking-jwt-secret-key-2024
  expiration: 86400000
