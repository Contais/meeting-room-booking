server:
  port: 8082

spring:
  application:
    name: mrb-auth
  config:
    import: "optional:nacos:application.yml"
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: 572b010e-ff99-4a28-bee4-13260db37c32
        file-extension: yml
        import-check:
          enabled: false
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: 572b010e-ff99-4a28-bee4-13260db37c32
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/mrb_auth?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:mrb-meeting-room-booking-jwt-secret-key-2024}
  expiration: 86400000
