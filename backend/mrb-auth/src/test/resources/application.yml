server:
  port: 0

spring:
  cloud:
    nacos:
      enabled: false
    config:
      import-check:
        enabled: false
  config:
    import: "optional:nacos:"
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: test-secret-key-for-integration-tests-min-256-bits!!
  expiration: 86400000
